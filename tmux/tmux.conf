################################################################################


################################################################################
#                               GENERAL SETTINGS                               #
################################################################################

# sets keybinding to source tmux file (unsets previous source file)
unbind r
bind r source-file "~/.config/tmux/tmux.conf"

# sets terminal color screen
set -g default-terminal "tmux-256color"
set-option -sa terminal-features ',xterm-256color:RGB'
set-option -sg escape-time 10
set-option -g focus-events on

# enables mouse reporting
set -g mouse on
unbind -T copy-mode-vi MouseDragEnd1Pane

# sets a new <leader> keybind (unsets previous <leader> keybind)
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# sets split window keybinds (unsets previous split window keybinds)
unbind %
bind "-" split-window -h
unbind '"'
bind "=" split-window -v

# sets window options
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# sets resize window pane keybinds
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

################################################################################
#                                 TPM SETTINGS                                 #
################################################################################


set -g @catppuccin_window_right_separator "█ "
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_middle_separator " | "

set -g @catppuccin_window_default_fill "none"

set -g @catppuccin_window_current_fill "all"

set -g @catppuccin_status_modules_right "application session user host date_time"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator "█"

set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M:%S"

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # integration with nvim navigation
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'sainnhe/tmux-fzf'

# set installed plugins
set -g @catppuccin_flavour 'mocha'
TMUX_FZF_LAUNCH_KEY="C-f"
TMUX_FZF_ORDER="session|window|pane|command|keybinding|clipboard|process"

# sets tmp tmux package manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# run the package manager
run "~/.config/tmux/plugins/tpm/tpm"

